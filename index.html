<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="桃園公車">
  <meta name="description" content="桃園市公車即時動態與時刻查詢">
  <meta name="theme-color" content="#1d4ed8">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="style.css">
  <title>桃園公車查詢</title>
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="app-header">
      <button id="back-btn" class="icon-btn hidden" onclick="App.goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <h1 id="page-title">桃園公車查詢</h1>
      <button id="settings-btn" class="icon-btn" onclick="App.showPage('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Main -->
    <main id="main">

      <!-- 首頁 -->
      <div id="page-home" class="page active">
        <div class="search-area">
          <div class="search-row">
            <div class="search-box">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
              </svg>
              <input type="text" id="route-input" placeholder="輸入路線號碼，如：706" autocomplete="off"
                     onkeydown="if(event.key==='Enter') App.searchRoutes()"
                     oninput="App.onSearchInput(this.value)">
              <button id="clear-btn" class="clear-btn hidden" onclick="App.clearSearch()">✕</button>
            </div>
            <button class="search-btn" onclick="App.searchRoutes()">查詢</button>
          </div>
        </div>

        <div id="section-favorites" class="section">
          <div class="section-header">
            <span class="section-title">常用路線</span>
          </div>
          <div id="favorites-list">
            <div class="empty-state">
              <span class="empty-icon">★</span>
              <p>查詢路線後，點擊 ☆ 可加入常用路線</p>
            </div>
          </div>
        </div>

        <div id="section-results" class="section hidden">
          <div class="section-header">
            <span class="section-title">搜尋結果</span>
            <span id="results-count" class="results-count"></span>
          </div>
          <div id="results-list"></div>
        </div>
      </div>

      <!-- 路線詳情頁 -->
      <div id="page-route" class="page">
        <div id="route-header" class="route-header-card"></div>

        <div class="tab-bar">
          <button class="tab-btn active" data-tab="realtime" onclick="App.switchTab('realtime', this)">即時動態</button>
          <button class="tab-btn" data-tab="schedule" onclick="App.switchTab('schedule', this)">時刻表</button>
          <button class="tab-btn" data-tab="stops" onclick="App.switchTab('stops', this)">站牌列表</button>
        </div>

        <div id="tab-realtime" class="tab-panel active">
          <div class="dir-toggle">
            <button id="rt-dir-0" class="dir-btn active" onclick="App.setRealtimeDir(0)">去程</button>
            <button id="rt-dir-1" class="dir-btn" onclick="App.setRealtimeDir(1)">返程</button>
          </div>
          <div id="realtime-content"></div>
        </div>

        <div id="tab-schedule" class="tab-panel">
          <div id="schedule-content"></div>
        </div>

        <div id="tab-stops" class="tab-panel">
          <div class="dir-toggle">
            <button id="stops-dir-0" class="dir-btn active" onclick="App.setStopsDir(0)">去程</button>
            <button id="stops-dir-1" class="dir-btn" onclick="App.setStopsDir(1)">返程</button>
          </div>
          <div id="stops-content"></div>
        </div>
      </div>

      <!-- 設定頁 -->
      <div id="page-settings" class="page">
        <div class="settings-card">
          <div class="settings-card-header">
            <div class="settings-icon">🔑</div>
            <div>
              <h2>TDX API 憑證</h2>
              <p>交通部資料服務平臺</p>
            </div>
          </div>
          <div class="settings-steps">
            <p>📋 設定步驟：</p>
            <ol>
              <li>前往 <strong>TDX 交通資料服務平臺</strong>（tdx.transportdata.tw）</li>
              <li>註冊免費帳號（每日 50 次查詢）</li>
              <li>至「帳號管理」取得 Client ID 與 Client Secret</li>
            </ol>
          </div>
          <div class="form-group">
            <label for="input-client-id">Client ID</label>
            <input type="text" id="input-client-id" placeholder="請輸入 Client ID" autocomplete="off" autocapitalize="none">
          </div>
          <div class="form-group">
            <label for="input-client-secret">Client Secret</label>
            <div class="password-wrap">
              <input type="password" id="input-client-secret" placeholder="請輸入 Client Secret" autocomplete="off" autocapitalize="none">
              <button class="toggle-pw" onclick="App.togglePassword()">👁</button>
            </div>
          </div>
          <button class="save-btn" onclick="App.saveSettings()">儲存設定</button>
          <div id="settings-msg" class="settings-msg hidden"></div>
        </div>

        <div class="settings-card about-card">
          <h3>關於</h3>
          <p>版本：1.0.0</p>
          <p>資料來源：交通部 TDX 交通資料服務平臺</p>
          <p>涵蓋：桃園市市區公車</p>
          <button class="clear-data-btn" onclick="App.clearFavorites()">清除常用路線</button>
        </div>
      </div>

    </main>

    <!-- Loading -->
    <div id="loading" class="loading-overlay hidden">
      <div class="spinner"></div>
      <p>載入中⋯</p>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
